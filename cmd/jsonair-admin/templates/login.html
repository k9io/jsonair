<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>JSONAir Admin — Login</title>
<style>
* { box-sizing: border-box; }
body { font-family: monospace; background: #f5f5f5; margin: 0; padding: 40px 20px; }
.card { background: #fff; border: 1px solid #ccc; padding: 30px; max-width: 380px; margin: 0 auto; }
h1 { font-size: 1.1em; margin: 0 0 20px 0; }
label { display: block; margin-top: 14px; font-size: 0.9em; }
input[type=text], input[type=password] { display: block; width: 100%; padding: 7px; margin-top: 4px; font-family: monospace; border: 1px solid #aaa; }
button { margin-top: 18px; padding: 8px 24px; font-family: monospace; cursor: pointer; }
.error { color: #c00; margin-top: 12px; font-size: 0.9em; }
</style>
</head>
<body>
<div class="card">
  <h1>JSONAir Admin</h1>
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  <form method="POST" action="/login">
    <label>Username</label>
    <input type="text" name="username" required autofocus autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" required autocomplete="current-password">
    <button type="submit">Login</button>
  </form>
</div>
</body>
</html>
